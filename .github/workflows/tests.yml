name: tests

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install packaging tools
        run: sudo apt-get update && sudo apt-get install -y binutils dpkg zstd rpm cpio

      - name: Run test suite
        run: |
          chmod +x pkgconvert.sh tests/run-tests.sh
          ./tests/run-tests.sh
